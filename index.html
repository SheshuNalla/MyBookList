<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>My Book List</title>
</head>
<body>
    <div class="container mt-4 mx-auto">
        <h1 class="text-6xl text-center">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-16 text-blue-500 inline-block">
                <path d="M11.25 4.533A9.707 9.707 0 0 0 6 3a9.735 9.735 0 0 0-3.25.555.75.75 0 0 0-.5.707v14.25a.75.75 0 0 0 1 .707A8.237 8.237 0 0 1 6 18.75c1.995 0 3.823.707 5.25 1.886V4.533ZM12.75 20.636A8.214 8.214 0 0 1 18 18.75c.966 0 1.89.166 2.75.47a.75.75 0 0 0 1-.708V4.262a.75.75 0 0 0-.5-.707A9.735 9.735 0 0 0 18 3a9.707 9.707 0 0 0-5.25 1.533v16.103Z" />
            </svg>
        My<span class="text-blue-500"> Book</span> List</h1>
        <form id="book-form">
            <div class="my-6">
               <label for="title" class="text-2xl ml-2">Title :</label><br>
               <input id="title" type="text" class="w-full h-14 mt-3 px-4 py-2 border border-slate-400 "> 
            </div>
            <div class="my-6">
               <label for="author" class="text-2xl ml-2">Author :</label><br>
               <input id="author" type="text" class="w-full h-14 mt-3 px-4 py-2 border border-slate-400 "> 
            </div>
            <div class="my-6">
               <label for="isbn" class="text-2xl ml-2 ">ISBN# :</label><br>
               <input id="isbn" type="text" class="w-full h-14 mt-3 px-4 py-2 border border-slate-400 "> 
            </div>
            <div>
                <input type="submit" value="Add Book" class="bg-blue-500 text-white w-full h-14 mt-3 text-2xl  hover:bg-blue-600 hover:cursor-pointer">
            </div>
        </form>
        <table class="min-w-full border border-gray-300 mt-8">
            <thead class=" bg-gray-300 h-12">
                <tr>
                    <th class="text-xl">Title</th>
                    <th class="text-xl">Author</th>
                    <th class="text-xl">ISBN#</th>
                    <th class="text-xl font-normal"></th>
                </tr>
            </thead>
            <tbody id="book-list" class=" h-12 text-center">
                
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
